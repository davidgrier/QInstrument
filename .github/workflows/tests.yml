name: Tests

on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get install -y libegl1 libgl1 libdbus-1-3 libxkbcommon0

      - name: Install Python dependencies
        run: pip install PyQt6 qtpy numpy pytest pytest-qt

      - name: Run tests
        run: pytest tests/
        env:
          QT_QPA_PLATFORM: offscreen
